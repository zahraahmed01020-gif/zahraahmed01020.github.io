<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Course - Course Organizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1 class="logo">Course Organizer</h1>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="courses.html">My Courses</a></li>
                    <li><a href="add-course.html" class="active">Add Course</a></li>
                    <li><a href="contact.html">Contact Us</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="container">
            <h2 class="page-title">Add New Course</h2>
            <div class="form-container">
                <form action="#" method="post">
                    <div class="form-group">
                        <label for="courseName">Course Name</label>
                        <input type="text" id="courseName" name="courseName" required placeholder="Enter course name">
                    </div>
                    <div class="form-group">
                        <label for="instructor">Instructor</label>
                        <input type="text" id="instructor" name="instructor" required placeholder="Enter instructor name">
                    </div>
                    <div class="form-group">
                        <label for="creditHours">Credit Hours</label>
                        <input type="number" id="creditHours" name="creditHours" min="1" max="6" required placeholder="Enter credit hours">
                    </div>
                    <div class="form-group">
                        <label for="notes">Notes</label>
                        <textarea id="notes" name="notes" placeholder="Enter any additional notes"></textarea>
                    </div>
                    <button type="submit" class="btn">Add Course</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Personal Course Organizer. All rights reserved.</p>
    </footer>
</body>
</html>
